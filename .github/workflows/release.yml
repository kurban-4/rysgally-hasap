name: Release Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean Install
        run: |
          # Уничтожаем старый кэш зависимостей, чтобы Гитхаб прочитал новый package.json
          Remove-Item package-lock.json -ErrorAction SilentlyContinue
          npm install
          cd src-tauri
          cargo fetch

      - name: Build App
        run: |
          # Теперь npm точно знает, где лежит vite
          npm run build
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirinNabat-Installer
          path: src-tauri/target/release/bundle/**/*.msi