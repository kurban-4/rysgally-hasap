name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            php-binary: php-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            php-binary: php-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Единый и надежный способ установки PHP для обеих ОС
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, sqlite3, mbstring, zip
          tools: composer:v2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # 2. Подготовка Sidecar бинарников (чтобы Tauri видел PHP)
      - name: Prepare Sidecar Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          cp $(which php) src-tauri/binaries/${{ matrix.php-binary }}

      - name: Prepare Sidecar Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir -p src-tauri/binaries
          Copy-Item (Get-Command php).Source src-tauri/binaries/${{ matrix.php-binary }}

      # 3. Установка зависимостей (теперь PHP точно есть в PATH)
      - name: Install Composer dependencies
        run: |
          cd src-tauri/resources/SirinNabat
          composer install --no-dev --optimize-autoloader

      # Твой хак с Pdo\Mysql (оставляем, раз он нужен для работы без расширения)
      - name: Fix Pdo\Mysql issue
        shell: bash
        run: |
          FILE="src-tauri/resources/SirinNabat/vendor/laravel/framework/src/Illuminate/Database/Connectors/MySqlConnector.php"
          if [ -f "$FILE" ]; then
            sed -i 's/PDO::MYSQL_ATTR_SSL_CA/1009/g' "$FILE" || sed -i '' 's/PDO::MYSQL_ATTR_SSL_CA/1009/g' "$FILE"
          fi

      - name: Clean Install
        shell: bash
        run: |
          rm -f package-lock.json
          npm install
          cd src-tauri
          cargo fetch

      - name: Build App
        shell: bash
        run: |
          npm run build
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirinNabat-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
