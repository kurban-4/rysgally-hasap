name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            php-binary: php-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            php-binary: php-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Download PHP binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://windows.php.net/downloads/releases/php-8.2.28-nts-Win32-vs16-x64.zip" -OutFile php.zip
          Expand-Archive php.zip -DestinationPath php-win
          Copy-Item php-win/php.exe src-tauri/binaries/php-x86_64-pc-windows-msvc.exe
          Copy-Item src-tauri/binaries/php.ini php-win/php.ini

      - name: Fix Pdo\Mysql issue
        shell: bash
        run: |
          sed -i 's/Pdo\\Mysql::ATTR_SSL_CA/1009/' src-tauri/resources/SirinNabat/vendor/laravel/framework/config/database.php

      - name: Clean Install
        shell: bash
        run: |
          rm -f package-lock.json
          npm install
          cd src-tauri
          cargo fetch

      - name: Build App
        shell: bash
        run: |
          npm run build
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirinNabat-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
